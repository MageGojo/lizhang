name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to upload the Windows package to"
        required: true
        default: "v1.0.0"
      version:
        description: "Package version used in the asset file name"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Run tests
        run: flutter test

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $asset = "Lizhang-${{ inputs.version }}-Windows-x64.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "dist/$asset" -Force
          Get-FileHash "dist/$asset" -Algorithm SHA256 | Format-List

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lizhang-${{ inputs.version }}-Windows-x64
          path: dist/Lizhang-${{ inputs.version }}-Windows-x64.zip

      - name: Upload to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" "dist/Lizhang-${{ inputs.version }}-Windows-x64.zip" --repo "${{ github.repository }}" --clobber
